name: report_minimal
engine: pdf
description: "Minimal grayscale report, less visual weight than report_modern."
page_size: A4
margin_inches: 1.0

# No layout_sequence -> layout picked automatically per item.

theme:
  primary_color: "2F2F2F"
  secondary_color: "9E9E9E"
  background: "FFFFFF"
  text_color: "3A3A3A"
  muted_color: "AAAAAA"
  on_primary: "FFFFFF"
  font_header: "Times-Bold"
  font_body: "Times-Roman"
